<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>PushUp — Меню</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet">
<style>
  /* ==== КОПИЯ дизайн-системы нативного PushUp (src/styles.css) ==== */
  :root{
    --radius:20px; --r-xl:24px; --r-2xl:28px; --r-3xl:32px;
    /* бренд */
    --brand:#10B981; --brand-dark:#059669; --flame:#F97316; --xp:#EAB308; --cyan:#06B6D4;
    /* светлая тема (по умолчанию, как в приложении) */
    --bg:#F7F9F9; --surface:#FFFFFF; --brdr:#E5E9EB; --ink:#0E1116; --slate:#5B6670;
    --muted:#EDF1EF; --accent:#D8F3E8; --accent-ink:#1C5D42;
    --shadow-card-color:#D6DEDA; --shadow-button-color:#059669;
    --grad-energy:linear-gradient(135deg,#10B981,#06B6D4);
    --grad-fire:linear-gradient(135deg,#F97316,#FB7185);
    --grad-victory:linear-gradient(135deg,#FBBF24,#F59E0B);
    --shadow-card:0 6px 0 0 var(--shadow-card-color);
    --shadow-button:0 4px 0 0 var(--shadow-button-color);
  }
  html.dark{
    --bg:#0B0E11; --surface:#161A1F; --brdr:#283039; --ink:#F7F9F9; --slate:#9AA4AD;
    --muted:#232A31; --accent:#173D2E; --accent-ink:#D8F3E8; --xp:#FBBF24; --brand-dark:#0A6E4E;
    --shadow-card-color:#05080B; --shadow-button-color:#0A6E4E;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;height:100%;background:var(--bg);color:var(--ink);
    font-family:"Nunito",ui-rounded,"SF Pro Rounded",system-ui,-apple-system,sans-serif;
    -webkit-font-smoothing:antialiased;overscroll-behavior:none;user-select:none}
  .mono{font-variant-numeric:tabular-nums}
  .app{max-width:440px;margin:0 auto;min-height:100%;display:flex;flex-direction:column}
  .main{flex:1;display:flex;flex-direction:column;gap:22px;
    padding:max(28px,calc(env(safe-area-inset-top) + 20px)) 20px 96px}
  svg{display:block}

  /* шапка */
  .head{display:flex;align-items:flex-start;justify-content:space-between;gap:12px}
  .head h1{margin:0;font-size:21px;font-weight:900;letter-spacing:-.02em;color:var(--ink)}
  .head p{margin:3px 0 0;font-size:14px;font-weight:700;color:var(--slate)}
  .streak{display:flex;align-items:center;gap:6px;background:rgba(249,115,22,.1);color:var(--flame);
    border-radius:var(--r-xl);padding:7px 12px;flex:none;font-weight:900}
  .streak .e{font-size:19px;line-height:1}
  .streak .n{font-size:15px}

  /* карточка уровня */
  .card{background:var(--surface);border:1px solid var(--brdr);border-radius:var(--r-3xl);
    padding:18px 20px;box-shadow:var(--shadow-card)}
  .lvl{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
  .lvl .l{display:flex;align-items:center;gap:9px}
  .lvl .badge{width:32px;height:32px;border-radius:999px;background:var(--brand);color:#fff;
    display:grid;place-items:center;font-weight:900;font-size:14px}
  .lvl .lt{font-size:14px;font-weight:800;color:var(--ink)}
  .lvl .xp{display:flex;align-items:center;gap:5px;color:var(--xp);font-weight:900;font-size:14px}
  .bar{height:12px;width:100%;background:var(--muted);border-radius:999px;overflow:hidden}
  .bar>i{display:block;height:100%;border-radius:999px;background:var(--xp);width:8%}
  .card .sub{margin:7px 0 0;font-size:12px;font-weight:700;color:var(--slate)}

  /* заголовок секции */
  .cap{font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:.08em;color:var(--slate);
    margin:2px 2px -8px}

  /* меню */
  .menu{display:flex;flex-direction:column;gap:12px}
  .mrow{display:flex;align-items:center;gap:14px;width:100%;text-align:left;cursor:pointer;
    background:var(--surface);border:1px solid var(--brdr);border-radius:var(--r-2xl);
    padding:14px 16px;box-shadow:var(--shadow-card);
    transition:transform .1s ease,box-shadow .1s ease}
  .mrow:active{transform:translateY(3px);box-shadow:0 3px 0 0 var(--shadow-card-color)}
  .ic{width:44px;height:44px;border-radius:14px;flex:none;display:grid;place-items:center;
    background:rgba(16,185,129,.12)}
  .ic svg{width:23px;height:23px;stroke:var(--brand);stroke-width:2.25;fill:none;
    stroke-linecap:round;stroke-linejoin:round}
  .ic.flame{background:rgba(249,115,22,.12)} .ic.flame svg{stroke:var(--flame)}
  .ic.gold{background:rgba(234,179,8,.14)} .ic.gold svg{stroke:var(--xp)}
  .tt{flex:1;min-width:0}
  .tt b{display:block;font-size:15px;font-weight:800;letter-spacing:-.01em;color:var(--ink)}
  .tt span{display:block;font-size:12px;font-weight:700;color:var(--slate);margin-top:2px;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .chev{flex:none;stroke:var(--slate);stroke-width:2.5;fill:none;stroke-linecap:round;stroke-linejoin:round;opacity:.55}
  .val{flex:none;font-weight:900;font-size:16px;color:var(--xp)}
  .pill{flex:none;border-radius:999px;padding:5px 12px;font-size:12px;font-weight:900}
  .pill.mut{background:var(--muted);color:var(--slate)}
  .pill.flame{background:rgba(249,115,22,.12);color:var(--flame)}
  .pill.ok{background:rgba(16,185,129,.14);color:var(--brand-dark)}

  /* акцентная строка «Начать тренировку» — как большая кнопка в приложении */
  .hero{display:flex;align-items:center;justify-content:space-between;gap:12px;width:100%;cursor:pointer;
    background:var(--grad-energy);color:#fff;border:0;border-radius:var(--r-3xl);padding:20px;
    box-shadow:var(--shadow-button);transition:transform .1s ease,box-shadow .1s ease}
  .hero:active{transform:translateY(4px);box-shadow:none}
  .hero .l{display:flex;align-items:center;gap:14px}
  .hero .hic{width:54px;height:54px;border-radius:16px;background:rgba(255,255,255,.2);
    display:grid;place-items:center;flex:none}
  .hero .hic svg{width:27px;height:27px;stroke:#fff;stroke-width:2.25;fill:none;stroke-linecap:round;stroke-linejoin:round}
  .hero b{display:block;font-size:18px;font-weight:900}
  .hero span{display:block;font-size:13px;font-weight:700;opacity:.92;margin-top:2px}
  .hero .chev{stroke:#fff;opacity:.8}

  .foot{margin-top:auto;text-align:center;font-size:12px;font-weight:700;color:var(--slate);opacity:.75;padding-top:6px}

  /* таб-бар — копия BottomNav (5 вкладок) */
  .tabbar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);z-index:40;width:100%;max-width:440px;
    display:flex;border-top:1px solid var(--brdr);background:color-mix(in srgb,var(--surface) 95%,transparent);
    backdrop-filter:blur(10px);padding:8px 8px calc(8px + env(safe-area-inset-bottom))}
  .tab{flex:1;min-height:56px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;
    border-radius:16px;font-size:11px;font-weight:800;color:var(--slate);cursor:pointer}
  .tab .i{font-size:23px;line-height:1}
  .tab.on{background:var(--accent);color:var(--accent-ink);transform:scale(1.05)}
</style>
</head>
<body>
<div class="app">
  <div class="main">

    <!-- шапка -->
    <div class="head">
      <div>
        <h1 id="greet">Привет, спортсмен!</h1>
        <p>Продолжай в том же духе</p>
      </div>
      <div class="streak"><span class="e">🔥</span><span class="n mono" id="s-streak">0</span></div>
    </div>

    <!-- уровень и XP -->
    <div class="card">
      <div class="lvl">
        <div class="l">
          <div class="badge" id="s-lvl">1</div>
          <div class="lt">Уровень <span id="s-lvl2">1</span></div>
        </div>
        <div class="xp">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M4 14a1 1 0 0 1-.78-1.63l9.9-10.2a.5.5 0 0 1 .86.46l-1.92 6.02A1 1 0 0 0 13 10h7a1 1 0 0 1 .78 1.63l-9.9 10.2a.5.5 0 0 1-.86-.46l1.92-6.02A1 1 0 0 0 11 14z"/></svg>
          <span class="mono" id="s-xp">0</span> XP
        </div>
      </div>
      <div class="bar"><i id="s-xpbar"></i></div>
      <p class="sub">Двигайся и расти в уровне 🦫</p>
    </div>

    <!-- ТРЕНИРОВКА -->
    <div class="cap">Тренировка</div>
    <div class="menu">
      <button class="hero" onclick="tap('workout')">
        <div class="l">
          <div class="hic"><svg viewBox="0 0 24 24"><path d="M14.4 14.4 9.6 9.6"/><path d="M18.657 21.485a2 2 0 1 1-2.829-2.828l-1.767 1.768a2 2 0 1 1-2.829-2.829l6.364-6.364a2 2 0 1 1 2.829 2.829l-1.768 1.767a2 2 0 1 1 2.828 2.829z"/><path d="m21.5 21.5-1.4-1.4"/><path d="M3.9 3.9 2.5 2.5"/><path d="M6.404 12.768a2 2 0 1 1-2.829-2.829l1.768-1.767a2 2 0 1 1-2.828-2.829l2.828-2.828a2 2 0 1 1 2.829 2.828l1.767-1.768a2 2 0 1 1 2.829 2.829z"/></svg></div>
          <div><b>Начать тренировку</b><span>Счётчик движения — без кнопок</span></div>
        </div>
        <svg class="chev" width="22" height="22" viewBox="0 0 24 24"><path d="m9 18 6-6-6-6"/></svg>
      </button>
      <button class="mrow" onclick="tap('progress')">
        <div class="ic"><svg viewBox="0 0 24 24"><path d="M3 3v18h18"/><path d="M18 17V9"/><path d="M13 17V5"/><path d="M8 17v-3"/></svg></div>
        <div class="tt"><b>Прогресс</b><span>Серия, рекорд, история по дням</span></div>
        <svg class="chev" width="20" height="20" viewBox="0 0 24 24"><path d="m9 18 6-6-6-6"/></svg>
      </button>
    </div>

    <!-- КАПИТАЛ -->
    <div class="cap">Капитал и статус</div>
    <div class="menu">
      <button class="mrow" onclick="tap('capital')">
        <div class="ic gold"><svg viewBox="0 0 24 24"><circle cx="8" cy="8" r="6"/><path d="M18.09 10.37A6 6 0 1 1 10.34 18"/><path d="M7 6h1v4"/><path d="m16.71 13.88.7.71-2.82 2.82"/></svg></div>
        <div class="tt"><b>Мой капитал</b><span>Баллы и фонд комьюнити</span></div>
        <div class="val mono" id="s-pts">0</div>
      </button>
      <button class="mrow" onclick="tap('leagues')">
        <div class="ic flame"><svg viewBox="0 0 24 24"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/></svg></div>
        <div class="tt"><b>Лиги</b><span>Изумрудная лига · твой ранг</span></div>
        <span class="pill mut">Бронза</span>
      </button>
      <button class="mrow" onclick="tap('quests')">
        <div class="ic"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg></div>
        <div class="tt"><b>Задания дня</b><span>Выполни цель и получи бонус</span></div>
        <span class="pill flame">0/3</span>
      </button>
    </div>

    <!-- СООБЩЕСТВО -->
    <div class="cap">Сообщество</div>
    <div class="menu">
      <button class="mrow" onclick="tap('duels')">
        <div class="ic"><svg viewBox="0 0 24 24"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg></div>
        <div class="tt"><b>Дуэли</b><span>Вызови друга прямо в чате Telegram</span></div>
        <span class="pill ok">NEW</span>
      </button>
      <button class="mrow" onclick="tap('profile')">
        <div class="ic"><svg viewBox="0 0 24 24"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></div>
        <div class="tt"><b>Профиль</b><span id="s-name">Твоя карточка и достижения</span></div>
        <svg class="chev" width="20" height="20" viewBox="0 0 24 24"><path d="m9 18 6-6-6-6"/></svg>
      </button>
      <button class="mrow" onclick="tap('settings')">
        <div class="ic"><svg viewBox="0 0 24 24"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg></div>
        <div class="tt"><b>Настройки</b><span>Калибровка датчика и уведомления</span></div>
        <svg class="chev" width="20" height="20" viewBox="0 0 24 24"><path d="m9 18 6-6-6-6"/></svg>
      </button>
    </div>

    <div class="foot">Двигайся как можешь — мы считаем 🦫</div>
  </div>

  <!-- таб-бар (5 вкладок, как в нативном приложении) -->

<script>
(function(){
  var tg = window.Telegram && window.Telegram.WebApp;
  if(tg){
    try{ tg.ready(); tg.expand(); }catch(e){}
    // тема как у приложения: следуем цветовой схеме Telegram
    if(tg.colorScheme==='dark') document.documentElement.classList.add('dark');
    try{ tg.onEvent && tg.onEvent('themeChanged', function(){
      document.documentElement.classList.toggle('dark', tg.colorScheme==='dark'); }); }catch(e){}
    try{ tg.setHeaderColor && tg.setHeaderColor(tg.colorScheme==='dark'?'#0B0E11':'#F7F9F9'); }catch(e){}
    var u = tg.initDataUnsafe && tg.initDataUnsafe.user;
    if(u && u.first_name){
      document.getElementById('greet').textContent = 'Привет, '+u.first_name+'!';
      document.getElementById('s-name').textContent = u.first_name+' · твоя карточка';
    }
  }
  // цифры из общего хранилища приложения
  try{
    var db = JSON.parse(localStorage.getItem('pushup_tg_v1')||'{}');
    if(db.streak!=null) document.getElementById('s-streak').textContent = db.streak;
    if(db.points!=null){
      document.getElementById('s-pts').textContent = (db.points||0).toLocaleString('ru');
      document.getElementById('s-xp').textContent  = (db.points||0).toLocaleString('ru');
      var pr = Math.max(8, Math.min(100, (db.points||0)%100)); // демо-заполнение уровня
      document.getElementById('s-xpbar').style.width = pr+'%';
    }
  }catch(e){}
  window.tap = function(dest){
    if(tg && tg.HapticFeedback){ try{ tg.HapticFeedback.impactOccurred('light'); }catch(e){} }
    if(navigator.vibrate){ try{ navigator.vibrate(12); }catch(e){} }
    // здесь будет переход на нужный экран приложения; пока это превью стиля меню
  };
})();
</script>
